<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo concept B: "Quad + translation glyph"
  A red text-quadrilateral (the data structure our pipeline lives on
  — a rotated rectangle around scene text) with the translation
  transform expressed as source "Aa" on one corner and target "文字"
  on the other. SFU red (#CC0633).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 500"
     width="500" height="500"
     font-family="Helvetica, Arial, sans-serif">

  <polygon points="70,180  440,120  430,340  80,300"
           fill="#ffffff" stroke="#CC0633" stroke-width="12"
           stroke-linejoin="round"/>

  <g fill="#CC0633">
    <circle cx="70"  cy="180" r="10"/>
    <circle cx="440" cy="120" r="10"/>
    <circle cx="430" cy="340" r="10"/>
    <circle cx="80"  cy="300" r="10"/>
  </g>

  <text x="160" y="260"
        font-size="110" font-weight="bold"
        font-family="Georgia, Times, serif"
        fill="#2a2a2a">Aa</text>

  <path d="M 265 232 L 295 232 L 295 222 L 315 238 L 295 254 L 295 246 L 265 246 Z"
        fill="#CC0633"/>

  <text x="330" y="255"
        font-size="80" font-weight="bold"
        font-family="PingFang SC, Noto Sans CJK SC, SimHei, sans-serif"
        fill="#CC0633">文字</text>

  <text x="250" y="420" text-anchor="middle"
        font-size="32" font-weight="bold" letter-spacing="5"
        fill="#CC0633">STR · V</text>
  <text x="250" y="453" text-anchor="middle"
        font-size="18"
        fill="#2a2a2a">Scene Text Replacement · Video</text>
  <text x="250" y="478" text-anchor="middle"
        font-size="14" font-style="italic"
        fill="#888">CMPT 743 · SFU Computing Science · 2026</text>
</svg>
