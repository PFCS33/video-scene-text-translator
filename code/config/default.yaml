# Default pipeline configuration
# Override per-run via CLI flags or a custom YAML file

input_video: ""
output_video: ""
log_level: "INFO"
debug_output_dir: null

detection:
  ocr_backend: "easyocr"  # "easyocr" or "paddleocr"
  ocr_languages: ["en"]
  ocr_confidence_threshold: 0.5
  min_text_area: 100
  # Per-detection composite scoring weights (must sum to 1.0)
  weight_ocr_confidence: 0.5
  weight_sharpness: 0.2
  weight_contrast: 0.1
  weight_frontality: 0.2
  # Reference frame selection: hard pre-filters (STRIVE-aligned)
  ref_ocr_min_confidence: 0.7
  ref_sharpness_top_k: 10
  # Reference frame selection: 2-metric composite weights
  ref_weight_contrast: 0.7    # Otsu interclass variance
  ref_weight_frontality: 0.3  # bbox area ratio
  frame_sample_rate: 1
  # Optical flow for tracking quads between frames
  optical_flow_method: "farneback"  # "farneback", "lucas_kanade", or "cotracker"
  # "gaps_only": only fill frames missing OCR detections
  # "full_propagation": propagate reference quad to ALL frames, overwriting OCR quads
  flow_fill_strategy: "full_propagation"
  # CoTracker3 settings (only used when optical_flow_method == "cotracker")
  cotracker_checkpoint: "third_party/co-tracker/checkpoints/scaled_offline.pth"
  cotracker_online_checkpoint: "third_party/co-tracker/checkpoints/scaled_online.pth"
  cotracker_window_len: 60
  farneback_pyr_scale: 0.5
  farneback_levels: 3
  farneback_winsize: 15
  farneback_iterations: 3
  farneback_poly_n: 5
  farneback_poly_sigma: 1.2
  lk_win_size: [21, 21]
  lk_max_level: 3

translation:
  source_lang: "en"
  target_lang: "es"
  backend: "deep-translator"
  api_key: null

frontalization:
  # Homography computation (frame quad → canonical frontal rectangle)
  homography_method: "RANSAC"
  ransac_reproj_threshold: 5.0

propagation:
  color_space: "YCrCb"
  histogram_bins: 256
  clip_limit: 2.0
  blend_blur_kernel: 5

revert:
  blend_border_size: 3
  blend_method: "gaussian"

text_editor:
  backend: "placeholder"
  model_path: null
  device: "cpu"
  # AnyText2 Gradio server (only used when backend == "anytext2")
  server_url: null
  server_timeout: 120
  anytext2_ddim_steps: 20
  anytext2_cfg_scale: 7.5
  anytext2_strength: 1.0
  anytext2_img_count: 1
  # Minimum generation size: upscale small ROIs so max(h,w) >= this value (256–1024)
  anytext2_min_gen_size: 512
  # ROI context expansion: include real scene pixels around text for better AnyText2 quality.
  # 0.0 = tight crop (default), 0.3 = 30% margin on each side.
  roi_context_expansion: 0.0
  # Adaptive mask sizing for AnyText2: shrink mask + pre-inpaint source text
  # when target is much narrower than source canonical (avoids gibberish-fill).
  # Only active when backend == "anytext2" AND propagation.inpainter_backend
  # is set. With backend == "placeholder" (this file's default) the flag is
  # a harmless no-op and is kept on so switching backends "just works".
  anytext2_adaptive_mask: true
  anytext2_mask_aspect_tolerance: 0.15   # skip if mismatch is below this fraction
  anytext2_mask_min_ratio: 0.25          # don't shrink below this × canonical width
