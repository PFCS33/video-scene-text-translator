# Default pipeline configuration
# Override per-run via CLI flags or a custom YAML file

input_video: ""
output_video: ""
log_level: "INFO"
debug_output_dir: null

detection:
  ocr_backend: "paddleocr"  # "easyocr" or "paddleocr"
  ocr_languages: ["en"]
  ocr_confidence_threshold: 0.9
  min_text_area: 100
  # Per-detection composite scoring weights (must sum to 1.0)
  weight_ocr_confidence: 0.5
  weight_sharpness: 0.2
  weight_contrast: 0.1
  weight_frontality: 0.2
  # Reference frame selection: hard pre-filters (STRIVE-aligned)
  ref_ocr_min_confidence: 0.7
  ref_sharpness_top_k: 10
  # Reference frame selection: 2-metric composite weights
  ref_weight_contrast: 0.7    # Otsu interclass variance
  ref_weight_frontality: 0.3  # bbox area ratio
  frame_sample_rate: 1
  # Optical flow for tracking quads between frames
  optical_flow_method: "cotracker"  # "farneback", "lucas_kanade", or "cotracker"
  # "gaps_only": only fill frames missing OCR detections
  # "full_propagation": propagate reference quad to ALL frames, overwriting OCR quads
  flow_fill_strategy: "full_propagation"
  # CoTracker3 settings (only used when optical_flow_method == "cotracker")
  cotracker_checkpoint: "../third_party/co-tracker/checkpoints/scaled_offline.pth"
  cotracker_online_checkpoint: "../third_party/co-tracker/checkpoints/scaled_online.pth"
  cotracker_window_len: 60
  farneback_pyr_scale: 0.5
  farneback_levels: 3
  farneback_winsize: 15
  farneback_iterations: 3
  farneback_poly_n: 5
  farneback_poly_sigma: 1.2
  lk_win_size: [21, 21]
  lk_max_level: 3
  # S1 quad smoothing: Kalman + EMA on gap-filled quads. Off by default
  # because S5 temporal smoothing handles stability at the output stage.
  # Enable only if S5 smoothing is disabled and you need S1-level filtering.
  use_flow_ocr_blend: false
  use_kalman_smoothing: false
  use_ema_smoothing: false
  cotracker_grid_size: 7

translation:
  source_lang: "en"
  target_lang: "zh-CN"
  backend: "deep-translator"
  api_key: null

frontalization:
  # Homography computation (frame quad → canonical frontal rectangle)
  homography_method: "RANSAC"
  ransac_reproj_threshold: 5.0

propagation:
  color_space: "YCrCb"
  histogram_bins: 256
  clip_limit: 2.0
  blend_blur_kernel: 5
  use_lcm: true
  # Background inpainter for LCM.
  # Backends: "srnet", "hisam", or "none".
  # inpainter_backend: "srnet"
  inpainter_backend: "hisam"   # swap in Hi-SAM stroke seg + cv2.inpaint
  # inpainter_checkpoint_path: "../third_party/SRNet/checkpoints/trained_final_5M_.model"
  # For hisam, point inpainter_checkpoint_path at a Hi-SAM head checkpoint, e.g.:
  inpainter_checkpoint_path: "../third_party/Hi-SAM/pretrained_checkpoint/sam_tss_l_textseg.pth"
  inpainter_device: "cuda"
  # Hi-SAM-specific (only used when inpainter_backend: "hisam")
  hisam_model_type: "vit_l"
  hisam_mask_dilation_px: 3
  hisam_inpaint_method: "ns"    # "ns" (Navier-Stokes) or "telea"
  hisam_use_patch_mode: false
  # Blur Prediction Network (TPM/BPN). Applies a per-frame differential
  # blur to the LCM-corrected ROI to match each frame's blur level.
  # Only invoked when both use_lcm and use_bpn are True (paper order:
  # LCM then BPN). bpn_image_size must match the resolution the
  # checkpoint was trained at.
  use_bpn: false
  bpn_checkpoint_path: "../checkpoints/bpn/bpn_v0.pt"
  bpn_device: "cuda"
  bpn_n_neighbors: 3
  bpn_image_size: [64, 128]  # (H, W) at training time
  bpn_kernel_size: 41
  # Attach per-detection canonical-frontal target ROI to each PropagatedROI
  # so the S5 alignment refiner can consume it. Required when revert.use_refiner
  # is on; otherwise this is wasted memory.
  save_target_canonical_roi: true

revert:
  blend_border_size: 3
  blend_method: "gaussian"
  # S5 alignment refiner: predicts a residual homography between
  # reference and target canonical ROIs, composing it into the warp
  # chain to correct residual CoTracker tracking error. See
  # code/src/models/refiner/README.md for the network design.
  use_refiner: true
  refiner_checkpoint_path: "../checkpoints/refiner/refiner_v1.pt"
  refiner_device: "cuda"
  refiner_image_size: [64, 128]  # (H, W) network input — must match training
  refiner_max_corner_offset_px: 16.0
  refiner_rejection_warn_threshold: 0.1
  temporal_smooth_window: 7
  temporal_smooth_sigma: 10
  pre_inpaint: true
  pre_inpaint_expansion: 0.15   # 15% expansion from centroid
  # Pre-inpaint backend: "srnet" or "hisam". Independent from
  # propagation.inpainter_backend — S4 and S5 can use different backends
  # (e.g. SRNet in S4, Hi-SAM in S5) or different checkpoints.
  # pre_inpaint_backend: "srnet"
  pre_inpaint_backend: "hisam"   # swap in Hi-SAM stroke seg + cv2.inpaint
  # pre_inpaint_checkpoint: "../third_party/SRNet/checkpoints/trained_final_5M_.model"
  # For hisam, point pre_inpaint_checkpoint at a Hi-SAM head checkpoint, e.g.:
  pre_inpaint_checkpoint: "../third_party/Hi-SAM/pretrained_checkpoint/sam_tss_l_textseg.pth"
  pre_inpaint_device: "cuda"
  # Hi-SAM-specific (only used when pre_inpaint_backend: "hisam")
  pre_inpaint_hisam_model_type: "vit_l"
  pre_inpaint_hisam_mask_dilation_px: 3
  pre_inpaint_hisam_inpaint_method: "ns"    # "ns" (Navier-Stokes) or "telea"
  pre_inpaint_hisam_use_patch_mode: false

text_editor:
  backend: "anytext2"
  model_path: null
  device: "cpu"
  # AnyText2 Gradio server (set to your server's URL, e.g. http://localhost:45843/)
  server_url: "http://109.231.106.68:45843/"
  #server_url: "http://localhost:6006/"
  server_timeout: 120
  anytext2_ddim_steps: 20
  anytext2_cfg_scale: 7.5
  anytext2_strength: 1.0
  anytext2_img_count: 1
  # Minimum generation size: upscale small ROIs so max(h,w) >= this value (256–1024)
  anytext2_min_gen_size: 512
  # ROI context expansion: include real scene pixels around text for better AnyText2 quality.
  # 0.0 = tight crop (default), 0.3 = 30% margin on each side.
  roi_context_expansion: 0.3
  # Adaptive mask sizing for AnyText2: shrink mask + pre-inpaint source text
  # when target is much narrower than source canonical (avoids gibberish-fill).
  # Requires propagation.inpainter_backend to be set (reuses the S4 inpainter).
  anytext2_adaptive_mask: true
  anytext2_mask_aspect_tolerance: 0.15   # skip if mismatch is below this fraction
