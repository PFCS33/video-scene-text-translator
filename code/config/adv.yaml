# Default pipeline configuration
# Override per-run via CLI flags or a custom YAML file

input_video: ""
output_video: ""
log_level: "INFO"
debug_output_dir: null

detection:
  ocr_backend: "paddleocr"  # "easyocr" or "paddleocr"
  ocr_languages: ["en"]
  ocr_confidence_threshold: 0.9
  min_text_area: 100
  # Per-detection composite scoring weights (must sum to 1.0)
  weight_ocr_confidence: 0.5
  weight_sharpness: 0.2
  weight_contrast: 0.1
  weight_frontality: 0.2
  # Reference frame selection: hard pre-filters (STRIVE-aligned)
  ref_ocr_min_confidence: 0.7
  ref_sharpness_top_k: 10
  # Reference frame selection: 2-metric composite weights
  ref_weight_contrast: 0.7    # Otsu interclass variance
  ref_weight_frontality: 0.3  # bbox area ratio
  frame_sample_rate: 1
  # Optical flow for tracking quads between frames
  optical_flow_method: "cotracker"  # "farneback", "lucas_kanade", or "cotracker"
  # "gaps_only": only fill frames missing OCR detections
  # "full_propagation": propagate reference quad to ALL frames, overwriting OCR quads
  flow_fill_strategy: "full_propagation"
  # CoTracker3 settings (only used when optical_flow_method == "cotracker")
  cotracker_checkpoint: "third_party/co-tracker/checkpoints/scaled_offline.pth"
  cotracker_online_checkpoint: "third_party/co-tracker/checkpoints/scaled_online.pth"
  cotracker_window_len: 60
  farneback_pyr_scale: 0.5
  farneback_levels: 3
  farneback_winsize: 15
  farneback_iterations: 3
  farneback_poly_n: 5
  farneback_poly_sigma: 1.2
  lk_win_size: [21, 21]
  lk_max_level: 3

translation:
  source_lang: "en"
  target_lang: "es"
  backend: "googletrans"
  api_key: null

frontalization:
  # Homography computation (frame quad → canonical frontal rectangle)
  homography_method: "RANSAC"
  ransac_reproj_threshold: 5.0

propagation:
  color_space: "YCrCb"
  histogram_bins: 256
  clip_limit: 2.0
  blend_blur_kernel: 5
  use_lcm: true
  # Background inpainter for LCM. Only loaded when use_lcm=True.
  # Backends: "srnet" (lksshw/SRNet wrapper) or "none".
  inpainter_backend: "srnet"
  inpainter_checkpoint_path: "third_party/SRNet/checkpoints/trained_final_5M_.model"
  inpainter_device: "cuda"
  # Blur Prediction Network (TPM/BPN). Applies a per-frame differential
  # blur to the LCM-corrected ROI to match each frame's blur level.
  # Only invoked when both use_lcm and use_bpn are True (paper order:
  # LCM then BPN). bpn_image_size must match the resolution the
  # checkpoint was trained at.
  use_bpn: true
  bpn_checkpoint_path: "checkpoints/bpn/bpn_v0.pt"
  bpn_device: "cuda"
  bpn_n_neighbors: 3
  bpn_image_size: [64, 128]  # (H, W) at training time
  bpn_kernel_size: 41

revert:
  blend_border_size: 3
  blend_method: "gaussian"

text_editor:
  backend: "placeholder"
  model_path: null
  device: "cpu"
